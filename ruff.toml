target-version = "py310"
line-length = 88
output-format = "concise"

[lint]
select = ["ALL"]
ignore = [
    "D203",
    "D213",
    "COM812",
    "ISC001",
    "F722",
]

[lint.per-file-ignores]
"test/**/*.py" = [
    "S101",
    "ARG",
    "FBT",
    "D",
    "ANN",
    "PLR2004",
    "SLF001",
    "PLR0913"
]

"src/**/*.py" = [
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D107"
]


fixable = ["ALL"]
unfixable = []

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

